[Fuzzer]
interface = ens33
trace = data/playground_someip_only.pcap
template = data/playground_fields.json
filter = udp and host 192.168.40.134 and port 31000
history = no
mode = replay
layer = SOMEIP

[Service]
host = 192.168.40.134
port = 31000

[Client]
host = 192.168.40.135
port = 58423

[Heartbeat]
host = 192.168.40.135
port = 58422
clientid = 4931
methodid = 1

[Run]
mode = fuzz
maxcases = 12
durationsec = 0
fuzzintervalsec = 1.0
heartbeatintervalsec = 3.0
heartbeatfailthreshold = 3
responsetimeoutsec = 0.3
heartbeattimeoutsec = 3.0
logcsv = results/results_llm_plan.csv
baselinemethodid = 1
focusedmethodids = 12
focusedrepeatcount = 1
payloadgenerator = payload_json
payloadcasesfile = results/payload_cases.json
payloadrepeatcount = 1
radamsarepeatcount = 1
radamsaseedhexlist = EMPTY,00,0000,0001,00010001
maxpayloadlen = 32

[AutoPlan]
enabled = yes
mode = auto
uselatestcsv = yes
inputcsv = 
resultsdir = results
payloadpath = results/payload_cases.json

